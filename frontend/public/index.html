<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Notes</h1>
    </header>

    <!-- Status message area -->
    <div id="status" class="status hidden"></div>

    <!-- Search bar -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search notes by title...">
      <button id="search-btn">Search</button>
      <button id="clear-btn" class="secondary">Clear</button>
    </div>

    <!-- Note form -->
    <div class="form-section">
      <h2 id="form-title">Create Note</h2>
      <form id="note-form">
        <input type="hidden" id="note-id">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" required placeholder="Enter note title">
        </div>
        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" required rows="4" placeholder="Enter note content"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Create Note</button>
          <button type="button" id="cancel-btn" class="secondary hidden">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Notes list -->
    <div class="notes-section">
      <h2>All Notes</h2>
      <div id="notes-list" class="notes-list">
        <p class="loading">Loading notes...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
